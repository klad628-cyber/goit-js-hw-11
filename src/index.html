<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Image Search</title>
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <div id="app">
      <form class="form">
        <label>
          <input
            type="text"
            name="search-text"
            placeholder="Search images..."
            required
          />
        </label>
        <button type="submit">Search</button>
      </form>
      <div id="loader" class="loader hidden"></div>
      <ul class="gallery"></ul>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
